[build]
target = "x86_64-pc-windows-msvc"

[alias]
# Собрать клиент (DLL)
build-client = "build -p client --release"

# Собрать devtools (DLL)  
build-dev = "build -p devtools --release"

# Debug-сборка devtools (DLL)
devtools = "build -p devtools"

# Debug-сборка клиента (DLL)
client-debug = "build -p client"

# Короткие run-* алиасы (для DLL это тоже build)
run-devtools = "build -p devtools"
run-client-debug = "build -p client"

# Запуск launcher в debug-режиме с нужным профилем инжекта
launch-dev = "run -p launcher -- --devtools"
launch-client = "run -p launcher -- --client"

# Короткие алиасы
ld = "run -p launcher -- --devtools"
lc = "run -p launcher -- --client"

# Собрать сервер
build-server = "build -p server --release"

# Собрать всё
build-all = "build --release"

# Запустить сервер
run-server = "run -p server --release"

# Запустить launcher
run-launcher = "run -p launcher --release"

# Быстрая проверка без сборки
chk = "check --workspace"

# Clippy по всему workspace
lint = "clippy --workspace --all-targets"